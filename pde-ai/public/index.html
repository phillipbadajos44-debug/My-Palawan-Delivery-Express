<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDE AI Developer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="header">
        <h2>🤖 PDE AI Developer</h2>
        <p>Your Personal Coding Assistant</p>
    </div>

    <div id="chat" class="chat">
        <div class="ai">
            Hello Phillip! 👋
            <br><br>
            I'm ready to build your apps.
        </div>
    </div>

    <div class="input-area">
        <textarea id="prompt" placeholder="Ask me to build an app..."></textarea>
        <button onclick="sendPrompt()">Send</button>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
